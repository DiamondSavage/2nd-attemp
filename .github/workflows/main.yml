- name: Build Docker Image
  run: docker build -t abdallaahhegazy/flask-app-new:latest .

- name: Run Container
  run: docker run -d -p 5000:5000 --name flask abdallaahhegazy/flask-app-new:latest

- name: Wait
  run: sleep 5

- name: Test Application
  run: curl http://localhost:5000

- name: Log in to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKER_USERNAME }}
    password: ${{ secrets.DOCKER_TOKEN }}

- name: Push Docker Image
  run: docker push abdallaahhegazy/flask-app-new:latest
